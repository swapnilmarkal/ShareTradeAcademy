<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | ShareTrade Academy</title>

  <style>
    :root {
      --primary: #0d1b2a;
      --accent: #00c896;
      --light: #f8fafc;
      --text: #1e293b;
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary), #050f1e);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 2.5rem;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 200, 150, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      color: rgba(255,255,255,0.7);
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🚧 Page Under Construction</h1>
    <p>
      We’re currently working on this section.<br>
      New content will be available soon.
    </p>

    <a href="index.html" class="btn">← Go Back Home</a>
  </div>

</body>
</html>
